{% extends 'base.html' %}
{% block title %}Scan Emergency QR{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1>📷 Scan Emergency QR</h1>
        <p class="help-text">Scan a Swasthya Sampark Health ID QR code to access critical patient information during an emergency.</p>
    </div>
    <div class="page-header-actions">
        <a href="{{ url_for('user_dashboard') }}" class="btn small">← Back to Dashboard</a>
    </div>
</div>

<div class="card glass scanner-container">
    <div id="reader"></div>
    <div id="scanner-status">
        <div class="spinner"></div> Requesting camera permission...
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const statusEl = document.getElementById('scanner-status');
    const readerEl = document.getElementById('reader');
    statusEl.innerHTML = "<div class='spinner'></div> Requesting secure camera access...";

    const html5QrCode = new Html5Qrcode("reader");
    let currentFacingMode = "environment";

    const config = { 
        fps: 10, 
        qrbox: {width: 250, height: 250},
        aspectRatio: 1.0
    };

    function onScanSuccess(decodedText, decodedResult) {
        console.log(`Scan result ${decodedText}`, decodedResult);
        statusEl.innerHTML = "✅ Scanning successful! Redirecting...";
        statusEl.style.color = "var(--success)";
        statusEl.style.fontWeight = "bold";
        readerEl.style.border = "2px solid var(--success)";
        readerEl.style.boxShadow = "0 0 20px rgba(34, 197, 94, 0.4)";
        
        html5QrCode.stop().then(() => {
            if(decodedText.includes('/scan/')) {
                window.location.href = decodedText;
            } else {
                window.location.href = "/scan/" + decodedText;
            }
        }).catch(err => console.log(err));
    }

    function startScan(facingMode) {
        // Try starting camera
        html5QrCode.start({ facingMode: facingMode }, config, onScanSuccess)
        .then(() => {
            currentFacingMode = facingMode; // Update state on success
            
            // Generate a switch camera button if we don't have one
            if (!document.getElementById("btn-switch-cam")) {
                const switchBtn = document.createElement("button");
                switchBtn.id = "btn-switch-cam";
                switchBtn.className = "btn small primary";
                switchBtn.style.marginTop = "15px";
                switchBtn.style.padding = "0.75rem 1.5rem";
                switchBtn.style.borderRadius = "8px";
                switchBtn.style.background = "linear-gradient(135deg, var(--primary), #3b82f6)";
                switchBtn.style.border = "none";
                switchBtn.style.color = "white";
                switchBtn.style.cursor = "pointer";
                switchBtn.style.fontWeight = "bold";
                switchBtn.innerHTML = "🔄 Switch to " + (facingMode === "environment" ? "Front" : "Back") + " Camera";
                
                switchBtn.onclick = function() {
                    const nextMode = (currentFacingMode === "environment") ? "user" : "environment";
                    html5QrCode.stop().then(() => {
                        startScan(nextMode);
                    });
                };
                
                document.querySelector('.scanner-container').insertBefore(switchBtn, statusEl.nextSibling);
            } else {
                // Just update text
                document.getElementById("btn-switch-cam").innerHTML = "🔄 Switch to " + (facingMode === "environment" ? "Front" : "Back") + " Camera";
            }
            statusEl.innerHTML = "Camera ready (" + (facingMode === "environment" ? "Back" : "Front") + "). Point at a Health QR Code.";
        })
        .catch(err => {
            // Fallback strategy if 'environment' fails
            console.warn("Error starting camera with facingMode:", facingMode, err);
            if (facingMode === "environment") {
                statusEl.innerHTML = "Back camera not found or blocked. Trying front camera...";
                startScan("user");
            } else {
                statusEl.innerHTML = "❌ Camera Access Error. Ensure you are using 'https://' and have granted permissions.";
                statusEl.style.color = "var(--danger)";
            }
        });
    }

    // Attempt back camera first
    startScan("environment");
});
</script>

<style>
.scanner-container {
    max-width: 600px; 
    margin: 2rem auto; 
    text-align: center;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#reader {
    width: 100%; 
    min-height: 300px; 
    border-radius: 16px; 
    overflow: hidden; 
    border: 2px solid var(--border);
    transition: all 0.3s ease;
}

#scanner-status {
    margin-top: 1.5rem; 
    color: var(--text-light);
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

/* Adjust html5-qrcode standard styling to match our sleek glassmorphism theme */
#reader button {
    background: linear-gradient(135deg, var(--primary), #3b82f6);
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    margin: 8px 4px;
    transition: transform 0.2s, opacity 0.2s;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
}

#reader button:hover {
    transform: translateY(-1px);
    opacity: 0.95;
    box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3);
}

#reader select {
    padding: 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
    background: var(--card-bg);
    color: var(--text-dark);
    font-family: inherit;
    width: 80%;
    max-width: 300px;
}

#reader a {
    color: var(--primary);
    text-decoration: none;
}

#reader__dashboard_section_swaplink {
    display: none !important; /* hide the 'scan an image file' link to keep it clean */
}

.spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(59, 130, 246, 0.3);
    border-radius: 50%;
    border-top-color: var(--primary);
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
{% endblock %}
