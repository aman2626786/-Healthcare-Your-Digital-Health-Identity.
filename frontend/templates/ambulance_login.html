{% extends 'base.html' %}
{% block title %}Ambulance Login{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Ambulance Driver Login</h1>
        <p class="help-text">Login to share live vehicle location for dispatch matching.</p>
    </div>
</div>

<div class="form-card narrow">
    <form method="post" class="card form-card">
        <div class="form-group">
            <label for="unit_code">Unit Code</label>
            <input id="unit_code" name="unit_code" required placeholder="e.g., AMB-BLR-01" value="{{ unit_code or '' }}">
        </div>
        <div class="form-group">
            <label for="contact_phone">Contact Phone</label>
            <input id="contact_phone" name="contact_phone" required placeholder="Registered phone" value="{{ contact_phone or '' }}">
        </div>
        <div class="form-group">
            <label for="login_pin">Login PIN</label>
            <input id="login_pin" name="login_pin" required placeholder="Assigned by hospital">
        </div>
        <button type="submit" class="btn primary full-width">Login as Driver</button>
    </form>
</div>
{% endblock %}
