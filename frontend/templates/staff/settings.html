{% extends 'staff/layout.html' %}

{% block staff_page_title %}Settings{% endblock %}

{% block staff_content %}
<section class="two-column">
  <div class="card form-card">
    <div class="section-header">
      <h2>Profile</h2>
      <span class="badge">Update</span>
    </div>

    <form method="post">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" name="name" value="{{ staff['name'] if staff else '' }}" required>
      </div>
      <div class="form-group">
        <label for="role_title">Role Title</label>
        <input id="role_title" name="role_title" value="{{ staff['role_title'] if staff and staff['role_title'] else '' }}" placeholder="e.g., Nurse, Lab Staff, Reception">
      </div>
      <button class="btn primary full-width" type="submit">Save Changes</button>
    </form>
  </div>

  <div class="card form-card">
    <div class="section-header">
      <h2>Change Password</h2>
      <span class="badge">Secure</span>
    </div>

    <form method="post">
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input id="current_password" name="current_password" type="password" required>
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input id="new_password" name="new_password" type="password" required>
      </div>
      <button class="btn primary full-width" type="submit">Update Password</button>
      <p class="help-text" style="margin-top:0.5rem;">If you forget your password, ask the hospital admin to reset it.</p>
    </form>
  </div>
</section>
{% endblock %}
